<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quality Defect Analytics - Systematic Industries</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <style>
        /* ==================== CSS VARIABLES ==================== */
        :root {
            --primary-color: #2563eb;
            --primary-dark: #1e40af;
            --primary-light: #3b82f6;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --issue1-color: #ff6384;
            --issue2-color: #36a2eb;
            --issue3-color: #ffce56;
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ==================== GLOBAL RESET ==================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ==================== BASE STYLES ==================== */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            line-height: 1.6;
        }

        /* ==================== HEADER ==================== */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            box-shadow: var(--shadow-md);
            z-index: 1000;
            transition: var(--transition);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-title {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-color), #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .header-subtitle {
            font-size: 0.875rem;
            color: var(--text-secondary);
            font-weight: 400;
            margin-left: 2.5rem;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        /* ==================== CONTAINER ==================== */
        .container {
            max-width: 1400px;
            margin: 100px auto 80px;
            padding: 2rem;
            flex-grow: 1;
        }

        /* ==================== SECTION STYLES ==================== */
        .section {
            background: var(--bg-secondary);
            padding: 2rem;
            margin-bottom: 2rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            transition: var(--transition);
            animation: fadeInUp 0.6s ease-out;
        }

        .section:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-xl);
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--border-color);
        }

        .section-header i {
            font-size: 1.5rem;
            color: var(--primary-color);
        }

        .section-header h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* ==================== STATS GRID ==================== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: white;
            border-radius: var(--radius-md);
            padding: 1.5rem;
            box-shadow: var(--shadow-md);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
        }

        .stat-card.issue1::before {
            background: linear-gradient(135deg, #ff6384, #ff3860);
        }

        .stat-card.issue2::before {
            background: linear-gradient(135deg, #36a2eb, #1e88e5);
        }

        .stat-card.issue3::before {
            background: linear-gradient(135deg, #ffce56, #ffc107);
        }

        .stat-card.total::before {
            background: linear-gradient(135deg, var(--primary-color), #8b5cf6);
        }

        .stat-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0.75rem;
            font-size: 1.5rem;
            color: white;
        }

        .stat-card.issue1 .stat-icon {
            background: linear-gradient(135deg, #ff6384, #ff3860);
        }

        .stat-card.issue2 .stat-icon {
            background: linear-gradient(135deg, #36a2eb, #1e88e5);
        }

        .stat-card.issue3 .stat-icon {
            background: linear-gradient(135deg, #ffce56, #ffc107);
        }

        .stat-card.total .stat-icon {
            background: linear-gradient(135deg, var(--primary-color), #8b5cf6);
        }

        .stat-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        /* ==================== CHART CONTAINER ==================== */
        .chart-container {
            background: white;
            border-radius: var(--radius-md);
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
            margin-top: 1.5rem;
        }

        .chart-wrapper {
            position: relative;
            height: 400px;
        }

        /* ==================== TABLE STYLES ==================== */
        .table-container {
            background: white;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            margin-top: 1.5rem;
        }

        .table-header {
            padding: 1rem 1.5rem;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
            color: white;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .table-wrapper {
            max-height: 400px;
            overflow-y: auto;
        }

        .table-wrapper::-webkit-scrollbar {
            width: 8px;
        }

        .table-wrapper::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        .table-wrapper::-webkit-scrollbar-thumb {
            background: var(--primary-color);
            border-radius: 4px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            position: sticky;
            top: 0;
            z-index: 10;
        }

        th {
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 0.75rem;
            text-align: left;
            font-weight: 600;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 0.75rem;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
            font-size: 0.9375rem;
        }

        tr:hover td {
            background: var(--bg-primary);
        }

        tr:last-child td {
            border-bottom: none;
        }

        .defect-type {
            font-weight: 600;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            display: inline-block;
            font-size: 0.875rem;
        }

        .defect-type.issue-1 {
            background: rgba(255, 99, 132, 0.1);
            color: var(--issue1-color);
        }

        .defect-type.issue-2 {
            background: rgba(54, 162, 235, 0.1);
            color: var(--issue2-color);
        }

        .defect-type.issue-3 {
            background: rgba(255, 206, 86, 0.1);
            color: var(--issue3-color);
        }

        /* ==================== BUTTONS ==================== */
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.9375rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            box-shadow: var(--shadow-sm);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
            color: white;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, var(--primary-dark), var(--primary-color));
        }

        .btn-success {
            background: linear-gradient(135deg, #10b981, #34d399);
            color: white;
        }

        .btn-success:hover {
            background: linear-gradient(135deg, #059669, #10b981);
        }

        .btn-secondary {
            background: white;
            color: var(--text-primary);
            border: 2px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--bg-primary);
            border-color: var(--primary-color);
        }

        .floating-btn {
            position: fixed;
            bottom: 20px;
            z-index: 1000;
            box-shadow: var(--shadow-lg);
        }

        .floating-btn.left {
            left: 20px;
        }

        .floating-btn.right {
            right: 20px;
        }

        /* ==================== FOOTER ==================== */
        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1rem;
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            color: var(--text-secondary);
            font-size: 0.875rem;
            box-shadow: 0 -4px 6px -1px rgba(0, 0, 0, 0.1);
            z-index: 1000;
        }

        footer strong {
            color: var(--text-primary);
        }

        /* ==================== LOADING STATE ==================== */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ==================== ANIMATIONS ==================== */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ==================== RESPONSIVE DESIGN ==================== */
        @media (max-width: 768px) {
            .header-title {
                font-size: 1.125rem;
            }

            .header-subtitle {
                display: none;
            }

            .container {
                margin: 80px auto 150px;
                padding: 1rem;
            }

            .section {
                padding: 1.25rem;
            }

            .section-header h2 {
                font-size: 1.25rem;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .chart-wrapper {
                height: 300px;
            }

            .header-actions {
                gap: 0.5rem;
            }

            .btn {
                padding: 0.5rem 1rem;
                font-size: 0.875rem;
            }

            th, td {
                padding: 0.5rem;
                font-size: 0.875rem;
            }

            .floating-btn {
                padding: 0.625rem 1rem;
                font-size: 0.875rem;
            }

            .floating-btn.left {
                left: 10px;
                bottom: 90px;
            }

            .floating-btn.right {
                right: 10px;
                bottom: 90px;
            }
        }

        /* ==================== UTILITY CLASSES ==================== */
        .hidden {
            display: none;
        }

        .text-center {
            text-align: center;
        }

        .mt-1 { margin-top: 0.5rem; }
        .mt-2 { margin-top: 1rem; }
        .mb-1 { margin-bottom: 0.5rem; }
        .mb-2 { margin-bottom: 1rem; }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay hidden">
        <div class="loading-spinner"></div>
    </div>

    <!-- Header -->
    <div class="header">
        <div class="header-content">
            <div>
                <div class="header-title">
                    <i class="fas fa-exclamation-triangle"></i> Quality Defect Analytics
                </div>
                <div class="header-subtitle">Real-time Quality Control Monitoring</div>
            </div>
            <div class="header-actions">
                <button class="btn btn-secondary" onclick="window.location.href='main.html'">
                    <i class="fas fa-arrow-left"></i> Back
                </button>
            </div>
        </div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- Summary Section -->
        <div class="section">
            <div class="section-header">
                <i class="fas fa-chart-pie"></i>
                <h2>Defect Summary</h2>
            </div>
            <div class="stats-grid">
                <div class="stat-card issue1">
                    <div class="stat-icon">
                        <i class="fas fa-bug"></i>
                    </div>
                    <div class="stat-label">Issue 1</div>
                    <div class="stat-value" id="issue1Count">0</div>
                </div>
                <div class="stat-card issue2">
                    <div class="stat-icon">
                        <i class="fas fa-exclamation-circle"></i>
                    </div>
                    <div class="stat-label">Issue 2</div>
                    <div class="stat-value" id="issue2Count">0</div>
                </div>
                <div class="stat-card issue3">
                    <div class="stat-icon">
                        <i class="fas fa-times-circle"></i>
                    </div>
                    <div class="stat-label">Issue 3</div>
                    <div class="stat-value" id="issue3Count">0</div>
                </div>
                <div class="stat-card total">
                    <div class="stat-icon">
                        <i class="fas fa-clipboard-list"></i>
                    </div>
                    <div class="stat-label">Total Defects</div>
                    <div class="stat-value" id="totalDefects">0</div>
                </div>
            </div>

            <!-- Chart -->
            <div class="chart-container">
                <div class="chart-wrapper">
                    <canvas id="defectiveChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Detailed Records Section -->
        <div class="section">
            <div class="section-header">
                <i class="fas fa-table"></i>
                <h2>Detailed Defect Records</h2>
            </div>
            <div class="table-container">
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th><i class="fas fa-calendar-alt"></i> Date</th>
                                <th><i class="fas fa-clock"></i> Time</th>
                                <th><i class="fas fa-user"></i> Staff</th>
                                <th><i class="fas fa-tag"></i> Issue Type</th>
                            </tr>
                        </thead>
                        <tbody id="defectiveTableBody">
                            <!-- Data will be populated here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Floating Action Buttons -->
    <button id="exportExcel" class="btn btn-success floating-btn left">
        <i class="fas fa-file-excel"></i> Export Excel
    </button>

    <!-- Footer -->
    <footer>
        <strong>Systematic Industries Ltd</strong> | Quality Control System © 2025
    </footer>

    <script>
        // ==================== FIREBASE CONFIGURATION ====================
        const firebaseConfig = {
            apiKey: "AIzaSyBIf_5OwMDRKm35I0x3v5LbibYyrBrug9k",
            databaseURL: "https://customer-2-88220-default-rtdb.firebaseio.com/"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // ==================== GLOBAL VARIABLES ====================
        let defectiveChart = null;
        const defectData = {
            dates: [],
            counts: [],
            issue1Counts: [],
            issue2Counts: [],
            issue3Counts: []
        };

        // ==================== UTILITY FUNCTIONS ====================
        function showLoading() {
            document.getElementById('loadingOverlay').classList.remove('hidden');
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').classList.add('hidden');
        }

        // ==================== DATA FETCHING ====================
        function fetchQualityDefects() {
            const defectsRef = database.ref('qualityDefects');
            
            defectsRef.on('value', (snapshot) => {
                const data = snapshot.val();
                let totalCount = 0;
                let issue1Count = 0;
                let issue2Count = 0;
                let issue3Count = 0;
                
                const tableBody = document.getElementById('defectiveTableBody');
                tableBody.innerHTML = '';
                
                defectData.dates = [];
                defectData.counts = [];
                defectData.issue1Counts = [];
                defectData.issue2Counts = [];
                defectData.issue3Counts = [];
                
                const dateGroups = {};
                
                if (data) {
                    for (const dateKey in data) {
                        const dateEntries = data[dateKey];
                        
                        for (const entryKey in dateEntries) {
                            const defect = dateEntries[entryKey];
                            totalCount++;
                            
                            const date = new Date(dateKey.replace(/-/g, '/'));
                            const dateString = date.toLocaleDateString('en-US', { 
                                month: 'short', 
                                day: 'numeric',
                                year: 'numeric'
                            });
                            
                            if (!dateGroups[dateString]) {
                                dateGroups[dateString] = {
                                    count: 0,
                                    issue1: 0,
                                    issue2: 0,
                                    issue3: 0
                                };
                            }
                            
                            const issueType = defect.defectType || 'N/A';
                            dateGroups[dateString].count++;
                            
                            if (issueType.includes('1')) {
                                dateGroups[dateString].issue1++;
                                issue1Count++;
                            } else if (issueType.includes('2')) {
                                dateGroups[dateString].issue2++;
                                issue2Count++;
                            } else if (issueType.includes('3')) {
                                dateGroups[dateString].issue3++;
                                issue3Count++;
                            }
                            
                            // Add to table
                            const row = document.createElement('tr');
                            const defectDate = new Date(defect.timestamp * 1000);
                            const timeString = defectDate.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                            const issueClass = issueType.toLowerCase().replace('_', '-');
                            
                            row.innerHTML = `
                                <td>${dateString}</td>
                                <td>${timeString}</td>
                                <td><i class="fas fa-user-circle" style="color: var(--primary-color); margin-right: 0.5rem;"></i>${defect.staff || 'N/A'}</td>
                                <td><span class="defect-type ${issueClass}">${issueType}</span></td>
                            `;
                            tableBody.appendChild(row);
                        }
                    }
                    
                    // Prepare chart data
                    const sortedDates = Object.keys(dateGroups).sort((a, b) => {
                        return new Date(a) - new Date(b);
                    });
                    
                    for (const date of sortedDates) {
                        defectData.dates.push(date);
                        defectData.counts.push(dateGroups[date].count);
                        defectData.issue1Counts.push(dateGroups[date].issue1);
                        defectData.issue2Counts.push(dateGroups[date].issue2);
                        defectData.issue3Counts.push(dateGroups[date].issue3);
                    }
                }
                
                // Update UI
                document.getElementById('totalDefects').textContent = totalCount;
                document.getElementById('issue1Count').textContent = issue1Count;
                document.getElementById('issue2Count').textContent = issue2Count;
                document.getElementById('issue3Count').textContent = issue3Count;
                
                updateChart();
                hideLoading();
            }, (error) => {
                console.error('Error fetching data:', error);
                document.getElementById('totalDefects').textContent = 'Error';
                hideLoading();
            });
        }

        // ==================== CHART UPDATE ====================
        function updateChart() {
            const ctx = document.getElementById('defectiveChart').getContext('2d');
            
            if (defectiveChart && typeof defectiveChart.destroy === 'function') {
                try {
                    defectiveChart.destroy();
                } catch (e) {
                    console.warn("Failed to destroy previous chart:", e);
                }
            }
            
            defectiveChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: defectData.dates,
                    datasets: [
                        {
                            label: 'ISSUE_1',
                            data: defectData.issue1Counts,
                            backgroundColor: 'rgba(255, 99, 132, 0.8)',
                            borderColor: '#ff6384',
                            borderWidth: 2,
                            borderRadius: 8
                        },
                        {
                            label: 'ISSUE_2',
                            data: defectData.issue2Counts,
                            backgroundColor: 'rgba(54, 162, 235, 0.8)',
                            borderColor: '#36a2eb',
                            borderWidth: 2,
                            borderRadius: 8
                        },
                        {
                            label: 'ISSUE_3',
                            data: defectData.issue3Counts,
                            backgroundColor: 'rgba(255, 206, 86, 0.8)',
                            borderColor: '#ffce56',
                            borderWidth: 2,
                            borderRadius: 8
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false
                    },
                    plugins: {
                        title: {
                            display: true,
                            text: 'Quality Defects by Type',
                            font: {
                                size: 16,
                                weight: 'bold'
                            }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(0, 0, 0, 0.8)',
                            padding: 12,
                            callbacks: {
                                label: function(context) {
                                    return context.dataset.label + ': ' + context.parsed.y;
                                }
                            }
                        },
                        legend: {
                            position: 'top',
                            labels: {
                                usePointStyle: true,
                                padding: 15
                            }
                        }
                    },
                    scales: {
                        x: {
                            stacked: false,
                            title: {
                                display: true,
                                text: 'Date',
                                font: {
                                    weight: 'bold'
                                }
                            },
                            grid: {
                                display: false
                            }
                        },
                        y: {
                            stacked: false,
                            title: {
                                display: true,
                                text: 'Number of Defects',
                                font: {
                                    weight: 'bold'
                                }
                            },
                            beginAtZero: true,
                            grid: {
                                color: 'rgba(0, 0, 0, 0.05)'
                            }
                        }
                    }
                }
            });
        }

        // ==================== EXCEL EXPORT ====================
        function exportToExcel() {
            showLoading();
            
            const exportData = [];
            const rows = document.querySelectorAll('#defectiveTableBody tr');
            
            exportData.push(['Date', 'Time', 'Staff', 'Issue Type']);
            
            rows.forEach(row => {
                const cells = row.querySelectorAll('td');
                exportData.push([
                    cells[0].textContent,
                    cells[1].textContent,
                    cells[2].textContent.trim(),
                    cells[3].textContent
                ]);
            });
            
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(exportData);
            
            XLSX.utils.book_append_sheet(wb, ws, 'Defect Records');
            XLSX.writeFile(wb, `Quality_Defects_${new Date().toISOString().split('T')[0]}.xlsx`);
            
            hideLoading();
        }

        // ==================== AUTO LOGOUT ====================
        let logoutTimer;

        function resetTimer() {
            clearTimeout(logoutTimer);
            logoutTimer = setTimeout(logoutUser, 1200000); // 20 minutes
        }

        function logoutUser() {
            localStorage.setItem("loggedIn", "false");
            window.location.href = "index.html";
        }

        ['mousemove', 'keypress', 'touchstart', 'click'].forEach(event => {
            document.addEventListener(event, resetTimer);
        });

        // ==================== SECURITY ====================
        document.addEventListener("contextmenu", e => e.preventDefault());
        
        document.addEventListener("keydown", function(e) {
            if (e.key === "F12" || 
                (e.ctrlKey && e.shiftKey && (e.key === "I" || e.key === "J" || e.key === "C")) ||
                (e.ctrlKey && (e.key === "c" || e.key === "x" || e.key === "u" || e.key === "s" || e.key === "P"))) {
                e.preventDefault();
            }
        });

        document.addEventListener("selectstart", e => e.preventDefault());

        // ==================== INITIALIZATION ====================
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                console.log("Signed in as:", user.uid);
                showLoading();
                
                fetchQualityDefects();
                resetTimer();
                
                // Auto-refresh every 5 minutes
                setInterval(fetchQualityDefects, 300000);
                
                // Export button
                document.getElementById('exportExcel').addEventListener('click', exportToExcel);
                
            } else {
                firebase.auth().signInAnonymously().catch((error) => {
                    console.error("Sign-in Error:", error);
                    hideLoading();
                });
            }
        });
    </script>
</body>
</html>
