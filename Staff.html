<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Production Analytics - Systematic Industries</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.16.9/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>

    <style>
        /* ==================== CSS VARIABLES ==================== */
        :root {
            --primary-color: #2563eb;
            --primary-dark: #1e40af;
            --primary-light: #3b82f6;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --info-color: #06b6d4;
            --purple-color: #8b5cf6;
            --pink-color: #ec4899;
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ==================== GLOBAL RESET ==================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ==================== BASE STYLES ==================== */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            line-height: 1.6;
        }

        /* ==================== HEADER ==================== */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            box-shadow: var(--shadow-md);
            z-index: 1000;
            transition: var(--transition);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-title {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-color), #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .header-subtitle {
            font-size: 0.875rem;
            color: var(--text-secondary);
            font-weight: 400;
            margin-left: 2.5rem;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        /* ==================== CONTAINER ==================== */
        .container {
            max-width: 1400px;
            margin: 100px auto 80px;
            padding: 2rem;
            flex-grow: 1;
        }

        /* ==================== SECTION STYLES ==================== */
        .staff-section {
            background: var(--bg-secondary);
            padding: 2rem;
            margin-bottom: 2rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            transition: var(--transition);
            animation: fadeInUp 0.6s ease-out;
        }

        .staff-section:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-xl);
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--border-color);
            flex-wrap: wrap;
            gap: 1rem;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .section-title i {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            color: white;
        }

        .staff-a .section-title i {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .staff-b .section-title i {
            background: linear-gradient(135deg, #f093fb, #f5576c);
        }

        .staff-c .section-title i {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
        }

        .section-title h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .total-count {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-secondary);
            background: var(--bg-primary);
            padding: 0.5rem 1rem;
            border-radius: var(--radius-sm);
        }

        .total-count strong {
            color: var(--primary-color);
            font-size: 1.25rem;
        }

        /* ==================== CONTENT GRID ==================== */
        .content-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

        .chart-container {
            background: white;
            padding: 1.5rem;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
        }

        .chart-wrapper {
            position: relative;
            height: 350px;
        }

        .data-container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* ==================== TABLE STYLES ==================== */
        .table-card {
            background: white;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
        }

        .table-header {
            padding: 1rem 1.5rem;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
            color: white;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .table-wrapper {
            max-height: 300px;
            overflow-y: auto;
        }

        .table-wrapper::-webkit-scrollbar {
            width: 8px;
        }

        .table-wrapper::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        .table-wrapper::-webkit-scrollbar-thumb {
            background: var(--primary-color);
            border-radius: 4px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            position: sticky;
            top: 0;
            z-index: 10;
        }

        th {
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 0.75rem;
            text-align: left;
            font-weight: 600;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 0.75rem;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
            font-size: 0.9375rem;
        }

        tr:hover td {
            background: var(--bg-primary);
        }

        tr:last-child td {
            border-bottom: none;
        }

        /* ==================== BUTTONS ==================== */
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.9375rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            box-shadow: var(--shadow-sm);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
            color: white;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, var(--primary-dark), var(--primary-color));
        }

        .btn-success {
            background: linear-gradient(135deg, #10b981, #34d399);
            color: white;
        }

        .btn-success:hover {
            background: linear-gradient(135deg, #059669, #10b981);
        }

        .btn-secondary {
            background: white;
            color: var(--text-primary);
            border: 2px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--bg-primary);
            border-color: var(--primary-color);
        }

        .btn-block {
            width: 100%;
            justify-content: center;
        }

        /* ==================== FOOTER ==================== */
        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1rem;
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            color: var(--text-secondary);
            font-size: 0.875rem;
            box-shadow: 0 -4px 6px -1px rgba(0, 0, 0, 0.1);
            z-index: 1000;
        }

        footer strong {
            color: var(--text-primary);
        }

        /* ==================== LOADING STATE ==================== */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ==================== ANIMATIONS ==================== */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ==================== RESPONSIVE DESIGN ==================== */
        @media (max-width: 1024px) {
            .content-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .header-title {
                font-size: 1.125rem;
            }

            .header-subtitle {
                display: none;
            }

            .container {
                margin: 80px auto 70px;
                padding: 1rem;
            }

            .staff-section {
                padding: 1.25rem;
            }

            .section-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .section-title h2 {
                font-size: 1.25rem;
            }

            .chart-wrapper {
                height: 250px;
            }

            .header-actions {
                gap: 0.5rem;
            }

            .btn {
                padding: 0.5rem 1rem;
                font-size: 0.875rem;
            }

            th, td {
                padding: 0.5rem;
                font-size: 0.875rem;
            }
        }

        /* ==================== UTILITY CLASSES ==================== */
        .hidden {
            display: none;
        }

        .text-center {
            text-align: center;
        }

        .mt-1 { margin-top: 0.5rem; }
        .mt-2 { margin-top: 1rem; }
        .mb-1 { margin-bottom: 0.5rem; }
        .mb-2 { margin-bottom: 1rem; }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay hidden">
        <div class="loading-spinner"></div>
    </div>

    <!-- Header -->

    <!-- Main Container -->

            <div class="content-grid">

                <div class="data-container">
                    <div class="table-card">

                            </table>

        <!-- Staff C Section -->
        <div class="staff-section staff-c">
            <div class="section-header">
                <div class="section-title">

                </div>

                <div class="data-container">

                    <button class="btn btn-success btn-block" onclick="downloadStaffData('StaffC')">
                        <i class="fas fa-file-excel"></i> Download Staff C Data

            </div>
        </div>

    <!-- Footer -->
    <footer>
        <strong>Systematic Industries Ltd</strong> | Staff Production Monitoring © 2025
    </footer>

    <script type="module">
        // ==================== FIREBASE CONFIGURATION ====================
        const firebaseConfig = {
            apiKey: "AIzaSyBIf_5OwMDRKm35I0x3v5LbibYyrBrug9k",
            databaseURL: "https://customer-2-88220-default-rtdb.firebaseio.com/"
        };

        import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js';
        import { getDatabase, ref, onValue } from 'https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js';

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const auth = getAuth(app);

        // ==================== GLOBAL VARIABLES ====================
        window.dayWiseTotalsA = {};
        window.monthlyTotalsA = {};
        window.dayWiseTotalsB = {};
        window.monthlyTotalsB = {};
        window.dayWiseTotalsC = {};
        window.monthlyTotalsC = {};
        window.myCharts = {};

        const staffRefs = {
            StaffA: ref(database, "Staff/StaffA/production"),
            StaffB: ref(database, "Staff/StaffB/production"),
            StaffC: ref(database, "Staff/StaffC/production")
        };

        // ==================== UTILITY FUNCTIONS ====================
        function showLoading() {
            document.getElementById('loadingOverlay').classList.remove('hidden');
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').classList.add('hidden');
        }

        // ==================== DATA FETCHING ====================
        function fetchProductionData(staff, chartId, tableBodyId, countId) {
            const dayWiseTotals = staff === 'StaffA' ? window.dayWiseTotalsA :
                                 staff === 'StaffB' ? window.dayWiseTotalsB : window.dayWiseTotalsC;
            const monthlyTotals = staff === 'StaffA' ? window.monthlyTotalsA :
                                 staff === 'StaffB' ? window.monthlyTotalsB : window.monthlyTotalsC;

            onValue(staffRefs[staff], (snapshot) => {
                const data = snapshot.val();
                if (!data) {
                    document.getElementById(countId).innerHTML = `Total: <strong>0</strong>`;
                    return;
                }

                // Clear previous totals
                Object.keys(dayWiseTotals).forEach(key => delete dayWiseTotals[key]);
                Object.keys(monthlyTotals).forEach(key => delete monthlyTotals[key]);

                const dailyProduction = {};
                const monthlyProduction = {};
                const years = new Set();
                let totalProductionCount = 0;

                // Sort entries by timestamp
                const sortedEntries = Object.values(data)
                    .map(entry => ({
                        timestamp: entry.timestamp,
                        count: parseFloat(entry.count.toFixed(1)),
                        date: new Date(entry.timestamp * 1000)
                    }))
                    .sort((a, b) => a.timestamp - b.timestamp);

                // Group entries by day
                const entriesByDay = {};
                sortedEntries.forEach(entry => {
                    const dateKey = entry.date.toLocaleDateString();
                    if (!entriesByDay[dateKey]) {
                        entriesByDay[dateKey] = [];
                    }
                    entriesByDay[dateKey].push(entry);
                });

                // Calculate daily production
                let previousDayLastCount = 0;
                Object.keys(entriesByDay).sort().forEach(dateKey => {
                    const dayEntries = entriesByDay[dateKey];
                    const firstCount = dayEntries[0].count;
                    const lastCount = dayEntries[dayEntries.length - 1].count;
                    const date = dayEntries[0].date;
                    const monthKey = `${date.toLocaleString('default', { month: 'short' })} ${date.getFullYear()}`;
                    years.add(date.getFullYear());

                    let dailyCount;
                    if (firstCount < previousDayLastCount) {
                        dailyCount = lastCount;
                    } else {
                        dailyCount = lastCount - previousDayLastCount;
                    }

                    dailyProduction[dateKey] = parseFloat(dailyCount.toFixed(1));
                    monthlyProduction[monthKey] = (monthlyProduction[monthKey] || 0) + dailyProduction[dateKey];
                    totalProductionCount += dailyProduction[dateKey];
                    previousDayLastCount = lastCount;
                });

                // Update totals objects
                Object.assign(dayWiseTotals, dailyProduction);
                Object.assign(monthlyTotals, monthlyProduction);

                // Initialize empty months
                years.forEach(year => {
                    ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec']
                        .forEach(month => {
                            const key = `${month} ${year}`;
                            if (!monthlyTotals[key]) monthlyTotals[key] = 0;
                        });
                });

                // Update UI
                updateProductionDisplay(
                    staff, chartId, tableBodyId, countId,
                    dayWiseTotals, parseFloat(totalProductionCount.toFixed(1))
                );
            }, (error) => {
                console.error(`Error fetching ${staff} data:`, error);
                document.getElementById(countId).innerHTML = `Total: <strong>Error</strong>`;
            });
        }

        // ==================== UI UPDATE ====================
        function updateProductionDisplay(staff, chartId, tableBodyId, countId, dayWiseTotals, totalProductionCount) {
            // Update total count display
            document.getElementById(countId).innerHTML = `Total: <strong>${totalProductionCount}</strong>`;
            
            // Update chart
            updateChart(chartId, dayWiseTotals, staff);
            
            // Update daily table
            const dailyTableBody = document.getElementById(tableBodyId);
            dailyTableBody.innerHTML = '';
            
            const sortedEntries = Object.entries(dayWiseTotals)
                .sort((a, b) => new Date(b[0]) - new Date(a[0])); // Newest first
            
            sortedEntries.forEach(([date, count]) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><i class="fas fa-calendar" style="color: var(--primary-color); margin-right: 0.5rem;"></i>${date}</td>
                    <td><strong>${count.toFixed(1)}</strong></td>
                `;
                dailyTableBody.appendChild(row);
            });
        }

        function updateChart(chartId, dayWiseTotals, staff) {
            const ctx = document.getElementById(chartId).getContext('2d');
            const labels = Object.keys(dayWiseTotals);
            const data = Object.values(dayWiseTotals);

            // Sort dates
            labels.sort((a, b) => new Date(a) - new Date(b));
            const sortedData = labels.map(label => dayWiseTotals[label]);

            // Calculate the last 5 days
            const last5Days = labels.slice(-5);
            
            // Destroy previous chart if it exists
            if (window.myCharts[chartId]) {
                window.myCharts[chartId].destroy();
            }

            // Get gradient colors based on staff
            let gradientColors;
            if (staff === 'StaffA') {
                gradientColors = ['rgba(102, 126, 234, 0.8)', 'rgba(118, 75, 162, 0.2)'];
            } else if (staff === 'StaffB') {
                gradientColors = ['rgba(240, 147, 251, 0.8)', 'rgba(245, 87, 108, 0.2)'];
            } else {
                gradientColors = ['rgba(79, 172, 254, 0.8)', 'rgba(0, 242, 254, 0.2)'];
            }

            // Create gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, 350);
            gradient.addColorStop(0, gradientColors[0]);
            gradient.addColorStop(1, gradientColors[1]);

            window.myCharts[chartId] = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: `Daily Production - ${staff}`,
                        data: sortedData,
                        backgroundColor: gradient,
                        borderColor: gradientColors[0],
                        borderWidth: 2,
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false
                    },
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            backgroundColor: 'rgba(0, 0, 0, 0.8)',
                            padding: 12,
                            borderColor: gradientColors[0],
                            borderWidth: 1,
                            callbacks: {
                                label: function(context) {
                                    return 'Count: ' + context.parsed.y.toFixed(1);
                                }
                            }
                        },
                        zoom: {
                            pan: {
                                enabled: true,
                                mode: 'x',
                                threshold: 10
                            },
                            zoom: {
                                wheel: { enabled: false },
                                pinch: { enabled: false },
                                mode: 'x'
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            title: {
                                display: true,
                                text: 'Count',
                                font: {
                                    weight: 'bold'
                                }
                            },
                            grid: {
                                color: 'rgba(0, 0, 0, 0.05)'
                            }
                        },
                        x: {
                            title: {
                                display: true,
                                text: 'Date',
                                font: {
                                    weight: 'bold'
                                }
                            },
                            min: last5Days.length > 0 ? last5Days[0] : undefined,
                            max: last5Days.length > 0 ? last5Days[last5Days.length - 1] : undefined,
                            ticks: {
                                autoSkip: false,
                                maxRotation: 45,
                                minRotation: 45
                            },
                            grid: {
                                display: false
                            }
                        }
                    }
                }
            });
        }

        // ==================== EXCEL EXPORT ====================
        window.downloadStaffData = function(staffName) {
            showLoading();
            
            const dayWiseTotals = staffName === 'StaffA' ? window.dayWiseTotalsA :
                                 staffName === 'StaffB' ? window.dayWiseTotalsB : window.dayWiseTotalsC;
            const monthlyTotals = staffName === 'StaffA' ? window.monthlyTotalsA :
                                 staffName === 'StaffB' ? window.monthlyTotalsB : window.monthlyTotalsC;

            if (!dayWiseTotals || Object.keys(dayWiseTotals).length === 0) {
                alert(`No data available for ${staffName} to download.`);
                hideLoading();
                return;
            }

            const dayWiseData = Object.keys(dayWiseTotals).map(date => ({
                Date: date,
                Count: dayWiseTotals[date].toFixed(1)
            }));

            const monthlyData = Object.keys(monthlyTotals).map(month => ({
                Month: month,
                Count: monthlyTotals[month].toFixed(1)
            }));

            const workbook = XLSX.utils.book_new();
            const worksheetDayWise = XLSX.utils.json_to_sheet(dayWiseData);
            const worksheetMonthly = XLSX.utils.json_to_sheet(monthlyData);

            XLSX.utils.book_append_sheet(workbook, worksheetDayWise, `${staffName} Day Wise`);
            XLSX.utils.book_append_sheet(workbook, worksheetMonthly, `${staffName} Monthly`);

            XLSX.writeFile(workbook, `${staffName}_Production_Data_${new Date().toISOString().split('T')[0]}.xlsx`);
            
            hideLoading();
        };

        // ==================== AUTO LOGOUT ====================
        let logoutTimer;

        function resetTimer() {
            clearTimeout(logoutTimer);
            logoutTimer = setTimeout(logoutUser, 1200000); // 20 minutes
        }

        function logoutUser() {
            localStorage.setItem("loggedIn", "false");
            window.location.href = "index.html";
        }

        ['mousemove', 'keypress', 'touchstart', 'click'].forEach(event => {
            document.addEventListener(event, resetTimer);
        });

        // ==================== SECURITY ====================
        document.addEventListener("contextmenu", e => e.preventDefault());
        
        document.addEventListener("keydown", function(e) {
            if (e.key === "F12" || e.key === "F11" ||
                (e.ctrlKey && e.shiftKey && (e.key === "I" || e.key === "J" || e.key === "C")) ||
                (e.ctrlKey && (e.key === "c" || e.key === "x" || e.key === "u" || e.key === "s" || e.key === "P"))) {
                e.preventDefault();
            }
        });

        document.addEventListener("selectstart", e => e.preventDefault());

        // ==================== INITIALIZATION ====================
        onAuthStateChanged(auth, (user) => {
            if (user) {
                console.log("Signed in as:", user.uid);
                showLoading();
                
                // Fetch data for all staff
                fetchProductionData('StaffA', 'productionChartA', 'productionTableBodyA', 'countA');
                fetchProductionData('StaffB', 'productionChartB', 'productionTableBodyB', 'countB');
                fetchProductionData('StaffC', 'productionChartC', 'productionTableBodyC', 'countC');
                
                resetTimer();
                
                // Hide loading after a short delay
                setTimeout(() => hideLoading(), 1000);
                
            } else {
                signInAnonymously(auth).catch((error) => {
                    console.error("Sign-in Error:", error);
                    hideLoading();
                });
            }
        });
    </script>
</body>
</html>
